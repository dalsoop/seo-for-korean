name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer:v2
          coverage: none

      - name: Install JS deps
        run: npm install --no-fund --no-audit

      - name: Build editor-sidebar bundle
        run: npm run build

      - name: Verify build output exists
        run: |
          test -f build/editor-sidebar.js
          test -f build/editor-sidebar.asset.php
          ls -la build/

      - name: Stage plugin files for zip
        run: |
          STAGE_DIR=/tmp/staging/seo-for-korean
          mkdir -p "$STAGE_DIR"
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.distignore' \
            --exclude='.editorconfig' \
            --exclude='.phpunit.cache' \
            --exclude='.phpunit.result.cache' \
            --exclude='.phpcs-cache' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='tests' \
            --exclude='src' \
            --exclude='docs' \
            --exclude='phpunit.xml*' \
            --exclude='phpcs.xml' \
            --exclude='composer.*' \
            --exclude='package*.json' \
            --exclude='webpack.config.js' \
            --exclude='README.md' \
            --exclude='CHANGELOG.md' \
            --exclude='*.log' \
            ./ "$STAGE_DIR/"
          echo "--- staged tree ---"
          ls -la "$STAGE_DIR/"

      - name: Create zip
        id: zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ZIP_NAME="seo-for-korean-${VERSION}.zip"
          cd /tmp/staging
          zip -rq "/tmp/${ZIP_NAME}" seo-for-korean
          ls -lh "/tmp/${ZIP_NAME}"
          echo "name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "path=/tmp/${ZIP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.path }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
